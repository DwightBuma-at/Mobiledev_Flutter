<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barangay Information Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <!-- Login Card -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 p-8 transition-all duration-300 hover:shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Barangay IMS</h1>
            <p class="text-slate-500 mt-2">Sign in to manage your community</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" id="username" required 
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="Enter your username">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 active:scale-[0.98]">
                Sign In
            </button>

        </form>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 transform transition-all scale-95 opacity-0 duration-200" id="modalContent">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                    <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-900">Login Failed</h3>
                <p class="text-sm text-slate-500 mt-2">
                    Invalid username or password. Please check your credentials and try again.
                </p>
                <div class="mt-6">
                    <button onclick="closeModal()" 
                        class="w-full inline-flex justify-center rounded-lg border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:text-sm transition-colors">
                        Try Again
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Feedback (Optional toast or redirect) -->
    <div id="successOverlay" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-white">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mb-4"></div>
            <p class="text-slate-600 font-medium">Accessing Dashboard...</p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorModal = document.getElementById('errorModal');
        const modalContent = document.getElementById('modalContent');
        const successOverlay = document.getElementById('successOverlay');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === 'admin123') {
                localStorage.removeItem('bims_current_resident');
                showSuccess('admin-side/dashboard.html', 'Accessing Admin Dashboard...');
                return;
            }

            const residents = JSON.parse(localStorage.getItem('bims_residents')) || [];
            const resident = residents.find(res => res.username === username && res.password === password);
            if (resident) {
                localStorage.setItem('bims_current_resident', JSON.stringify({
                    id: resident.id,
                    name: `${resident.firstName || ''} ${resident.lastName || ''}`.trim(),
                    username: resident.username
                }));
                showSuccess('resident-side/dashboard.html', 'Accessing Resident Portal...');
                return;
            }

            showError();
        });

        function showError() {
            errorModal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            modalContent.classList.add('scale-95', 'opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                errorModal.classList.add('hidden');
            }, 200);
        }

        function showSuccess(targetUrl, message) {
            successOverlay.querySelector('p').textContent = message;
            successOverlay.classList.remove('hidden');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1000);
        }

        // Close modal on click outside
        errorModal.addEventListener('click', (e) => {
            if (e.target === errorModal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
